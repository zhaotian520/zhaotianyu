name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Check Android SDK
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null || echo "No platforms dir"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Fix Kotlin version for React Native 0.81 compatibility
        run: |
          # Fix root build.gradle — only if version not already set (idempotent)
          if grep -q "org.jetbrains.kotlin:kotlin-gradle-plugin'" android/build.gradle 2>/dev/null; then
            sed -i "s/org.jetbrains.kotlin:kotlin-gradle-plugin'/org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20'/" android/build.gradle
            echo "=== Kotlin version patched in build.gradle ==="
          else
            echo "=== Kotlin version already set or not needed ==="
          fi
          grep "kotlin-gradle-plugin" android/build.gradle
          # Fix expo-dev-launcher gradle plugin
          DEV_LAUNCHER="node_modules/expo-dev-launcher/expo-dev-launcher-gradle-plugin/build.gradle.kts"
          if [ -f "$DEV_LAUNCHER" ]; then
            sed -i 's/kotlin("jvm") version "1\.9\.25"/kotlin("jvm") version "2.1.20"/' "$DEV_LAUNCHER"
            echo "=== dev-launcher kotlin ==="
            grep "kotlin" "$DEV_LAUNCHER"
          fi
          echo "Kotlin version patched"

      - name: Build release APK
        run: |
          cd android
          set +e
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee gradle.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Build exit code: $EXIT_CODE ==="
          echo "=== Gradle ERROR lines ==="
          grep -in "ERROR:\|FAILED\|error:\|Error:" gradle.log || echo "(no ERROR lines found)"
          echo "=== Last 30 lines ==="
          tail -30 gradle.log
          exit $EXIT_CODE

      - name: Find APK files
        run: |
          echo "=== Searching for APK files ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          echo "=== Searching for AAB files ==="
          find android -name "*.aab" -type f 2>/dev/null || echo "No AAB files found"
          echo "=== Checking build output dir ==="
          ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No release dir"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: real-estate-video-apk
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
