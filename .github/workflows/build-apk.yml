name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Fix Kotlin version for React Native 0.81 compatibility
        run: |
          # Fix root build.gradle
          sed -i "s/org.jetbrains.kotlin:kotlin-gradle-plugin\b/org.jetbrains.kotlin:kotlin-gradle-plugin:2.1.20/" android/build.gradle
          # Fix expo-dev-launcher gradle plugin
          DEV_LAUNCHER="node_modules/expo-dev-launcher/expo-dev-launcher-gradle-plugin/build.gradle.kts"
          if [ -f "$DEV_LAUNCHER" ]; then
            sed -i 's/kotlin("jvm") version "1\.9\.25"/kotlin("jvm") version "2.1.20"/' "$DEV_LAUNCHER"
          fi
          echo "Kotlin version patched"

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --max-workers 2 --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: real-estate-video-apk
          path: android/app/build/outputs/apk/release/app-release.apk
